services:
  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --realm=${TURN_REALM}
      - --use-auth-secret
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET}
      - --listening-ip=0.0.0.0
      - --external-ip=${TURN_EXTERNAL_IP}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
